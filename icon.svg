<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#0f1735"/>
      <stop offset="100%" stop-color="#06091a"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4b44a"/>
      <stop offset="50%" stop-color="#c8a84b"/>
      <stop offset="100%" stop-color="#8a6e2a"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8cc6a"/>
      <stop offset="100%" stop-color="#c8a84b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- Subtle star field -->
  <circle cx="85" cy="75" r="1.5" fill="#5b9fd6" opacity="0.5"/>
  <circle cx="430" cy="60" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="60" cy="420" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="445" cy="400" r="1.5" fill="#fff" opacity="0.4"/>
  <circle cx="75" cy="250" r="1" fill="#5b9fd6" opacity="0.3"/>
  <circle cx="440" cy="230" r="1" fill="#fff" opacity="0.3"/>

  <!-- Compass bezel (outer ring with degree marks) -->
  <circle cx="256" cy="256" r="225" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.5"/>
  <circle cx="256" cy="256" r="215" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.3"/>
  <!-- Cardinal tick marks on bezel -->
  <g stroke="url(#gold)" stroke-width="2.5" opacity="0.6">
    <line x1="256" y1="31" x2="256" y2="50"/>
    <line x1="256" y1="462" x2="256" y2="481"/>
    <line x1="31" y1="256" x2="50" y2="256"/>
    <line x1="462" y1="256" x2="481" y2="256"/>
  </g>
  <!-- Intercardinal tick marks -->
  <g stroke="url(#gold)" stroke-width="1.5" opacity="0.4">
    <line x1="414" y1="97" x2="403" y2="108"/>
    <line x1="97" y1="97" x2="108" y2="108"/>
    <line x1="97" y1="414" x2="108" y2="403"/>
    <line x1="414" y1="414" x2="403" y2="403"/>
  </g>
  <!-- N marker -->
  <text x="256" y="27" text-anchor="middle" font-family="Georgia,serif" font-size="18" font-weight="700" fill="url(#goldLight)" opacity="0.7">N</text>

  <!-- Sextant silhouette (behind wheel) -->
  <g transform="translate(256,256)" opacity="0.15" fill="#c8a84b">
    <path d="M-110,80 A165,165 0 0,1 110,80" stroke="#c8a84b" stroke-width="10" fill="none"/>
    <line x1="0" y1="-155" x2="0" y2="90" stroke="#c8a84b" stroke-width="8"/>
    <rect x="-75" y="-148" width="68" height="12" rx="3" transform="rotate(-15)"/>
    <line x1="0" y1="80" x2="-50" y2="140" stroke="#c8a84b" stroke-width="8"/>
    <line x1="0" y1="80" x2="50" y2="140" stroke="#c8a84b" stroke-width="8"/>
  </g>

  <!-- Ship's wheel -->
  <g transform="translate(256,256)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="160" fill="none" stroke="url(#gold)" stroke-width="13"/>
    <circle cx="0" cy="0" r="147" fill="none" stroke="url(#gold)" stroke-width="2.5" opacity="0.4"/>

    <!-- 8 Wheel handles (pegs) -->
    <g fill="url(#gold)">
      <rect x="-8" y="-193" width="16" height="38" rx="8"/>
      <rect x="-8" y="-193" width="16" height="38" rx="8" transform="rotate(45)"/>
      <rect x="-8" y="-193" width="16" height="38" rx="8" transform="rotate(90)"/>
      <rect x="-8" y="-193" width="16" height="38" rx="8" transform="rotate(135)"/>
      <rect x="-8" y="-193" width="16" height="38" rx="8" transform="rotate(180)"/>
      <rect x="-8" y="-193" width="16" height="38" rx="8" transform="rotate(225)"/>
      <rect x="-8" y="-193" width="16" height="38" rx="8" transform="rotate(270)"/>
      <rect x="-8" y="-193" width="16" height="38" rx="8" transform="rotate(315)"/>
    </g>

    <!-- 8 Spokes -->
    <g stroke="url(#gold)" stroke-width="5">
      <line x1="0" y1="-50" x2="0" y2="-153"/>
      <line x1="0" y1="-50" x2="0" y2="-153" transform="rotate(45)"/>
      <line x1="0" y1="-50" x2="0" y2="-153" transform="rotate(90)"/>
      <line x1="0" y1="-50" x2="0" y2="-153" transform="rotate(135)"/>
      <line x1="0" y1="-50" x2="0" y2="-153" transform="rotate(180)"/>
      <line x1="0" y1="-50" x2="0" y2="-153" transform="rotate(225)"/>
      <line x1="0" y1="-50" x2="0" y2="-153" transform="rotate(270)"/>
      <line x1="0" y1="-50" x2="0" y2="-153" transform="rotate(315)"/>
    </g>

    <!-- Hub ring -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="url(#gold)" stroke-width="6"/>
    <circle cx="0" cy="0" r="43" fill="url(#bg)" stroke="url(#gold)" stroke-width="2" opacity="0.8"/>

    <!-- Compass rose (8-point star) -->
    <polygon points="0,-120 10,-25 0,0 -10,-25" fill="url(#goldLight)"/>
    <polygon points="0,120 10,25 0,0 -10,25" fill="url(#gold)" opacity="0.7"/>
    <polygon points="-120,0 -25,10 0,0 -25,-10" fill="url(#gold)" opacity="0.7"/>
    <polygon points="120,0 25,10 0,0 25,-10" fill="url(#gold)" opacity="0.7"/>
    <polygon points="-78,-78 -17,-10 0,0 -10,-17" fill="url(#gold)" opacity="0.5"/>
    <polygon points="78,-78 17,-10 0,0 10,-17" fill="url(#gold)" opacity="0.5"/>
    <polygon points="-78,78 -17,10 0,0 -10,17" fill="url(#gold)" opacity="0.5"/>
    <polygon points="78,78 17,10 0,0 10,17" fill="url(#gold)" opacity="0.5"/>

    <!-- Center dot -->
    <circle cx="0" cy="0" r="6" fill="url(#goldLight)"/>

    <!-- Starsight: crosshair reticle (AR viewfinder) -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="url(#goldLight)" stroke-width="1.5" opacity="0.6" stroke-dasharray="4,4"/>
    <line x1="0" y1="-38" x2="0" y2="-30" stroke="url(#goldLight)" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="30" x2="0" y2="38" stroke="url(#goldLight)" stroke-width="2" opacity="0.6"/>
    <line x1="-38" y1="0" x2="-30" y2="0" stroke="url(#goldLight)" stroke-width="2" opacity="0.6"/>
    <line x1="30" y1="0" x2="38" y2="0" stroke="url(#goldLight)" stroke-width="2" opacity="0.6"/>
  </g>
</svg>
